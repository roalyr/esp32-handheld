; PROJECT: ESP32-S2-Mini handheld terminal
; MODULE: platformio.ini
; STATUS: [Level 2 - Implementation]
; TRUTH_LINK: TACTICAL_TODO TASK_2
; LOG_REF: 2026-05-05

[env:lolin_s2_mini]
platform = espressif32
board = lolin_s2_mini
framework = arduino
monitor_speed = 115200
upload_port = /dev/ttyACM3
monitor_port = /dev/ttyACM3
upload_protocol = custom
upload_command = bash scripts/flash.sh
build_src_filter =
    +<*>
    -<diag/esp32_s3_n16r8_diag.cpp>
    -<apps/gfx_test.cpp>
    -<apps/menu.cpp>
    -<apps/stopwatch.cpp>
    -<apps/file_browser.cpp>
    -<apps/lua_runner.cpp>
    -<apps/clock.cpp>
    -<apps/key_tester.cpp>
board_build.partitions = huge_app.csv
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
board_build.arduino.memory_type = qio_qspi
lib_deps =
    olikraus/U8g2 @ ^2.35.9
    chris--a/Keypad @ ^3.1.1
    https://github.com/DECE2183/libLua.git
    greiman/SdFat @ ^2.2.3

[env:esp32-s3-n16r8_diag]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0
upload_protocol = esptool
build_src_filter =
    -<*>
    +<diag/esp32_s3_n16r8_diag.cpp>
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DESP32_S3_N16R8_DIAG=1

[env:emulator]
platform = native
build_src_filter =
    +<*>
    +<../emulator_mocks/*.cpp>
    -<diag/esp32_s3_n16r8_diag.cpp>
build_flags =
    -DPLATFORM_EMULATOR
    -Iemulator_mocks
lib_deps =
    https://github.com/DECE2183/libLua.git
lib_compat_mode = off