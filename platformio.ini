[env:lolin_s2_mini]
platform = espressif32
board = lolin_s2_mini
framework = arduino
monitor_speed = 115200
upload_port = /dev/ttyACM3
monitor_port = /dev/ttyACM3
upload_protocol = custom
upload_command = bash scripts/flash.sh
build_src_filter =
    +<*>
    -<apps/t9_editor.cpp>
    -<apps/gfx_test.cpp>
    -<apps/menu.cpp>
    -<apps/stopwatch.cpp>
    -<apps/file_browser.cpp>
    -<apps/yes_no_prompt.cpp>
    -<apps/lua_runner.cpp>
    -<apps/clock.cpp>
    -<apps/key_tester.cpp>
    -<app_transfer.cpp>
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    olikraus/U8g2 @ ^2.35.9
    chris--a/Keypad @ ^3.1.1
    https://github.com/DECE2183/libLua.git